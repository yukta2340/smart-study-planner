<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="darkGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0.1" />
    </radialGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="200" cy="220" r="150" fill="url(#darkGlow)" filter="url(#shadow)"/>

  <!-- Sparkles -->
  <g opacity="0.6">
    <circle cx="320" cy="100" r="3" fill="#a78bfa"/>
    <circle cx="80" cy="150" r="2" fill="#c4b5fd"/>
    <circle cx="350" cy="200" r="2.5" fill="#a78bfa"/>
    <circle cx="60" cy="250" r="2" fill="#c4b5fd"/>
    <circle cx="320" cy="320" r="2" fill="#a78bfa"/>
  </g>

  <!-- Book base (purple) -->
  <g transform="translate(200, 240)">
    <!-- Book spine -->
    <rect x="-60" y="-40" width="120" height="80" fill="#6d28d9" rx="4"/>
    <rect x="-60" y="-40" width="120" height="15" fill="#7c3aed" rx="4"/>
    <!-- Book bookmark -->
    <rect x="40" y="-35" width="8" height="50" fill="#f59e0b"/>
  </g>

  <!-- Graduation cap (on top of book) -->
  <g transform="translate(200, 160)">
    <!-- Cap base -->
    <ellipse cx="0" cy="0" rx="50" ry="15" fill="#5b21b6"/>
    <!-- Cap top -->
    <polygon points="0,-50 -45,5 45,5" fill="#6d28d9"/>
    <!-- Tassel -->
    <line x1="0" y1="5" x2="0" y2="50" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="0" cy="55" r="4" fill="#f59e0b"/>
  </g>

  <!-- AI Cube (right side) -->
  <g transform="translate(280, 200)">
    <!-- Cube front face -->
    <rect x="-35" y="-35" width="70" height="70" fill="#4f46e5" stroke="#7c3aed" stroke-width="2"/>
    <!-- Cube top face -->
    <polygon points="-35,-35 -10,-55 60,-55 35,-35" fill="#6366f1" stroke="#7c3aed" stroke-width="2"/>
    <!-- Cube right face -->
    <polygon points="35,-35 60,-55 60,15 35,35" fill="#4f46e5" stroke="#7c3aed" stroke-width="2"/>
    <!-- AI text -->
    <text x="0" y="8" font-size="24" font-weight="bold" fill="#e0e7ff" text-anchor="middle">AI</text>
  </g>

  <!-- Chart icon (left side, top) -->
  <g transform="translate(120, 140)">
    <rect x="-25" y="0" width="50" height="40" fill="#6d28d9" rx="4" stroke="#7c3aed" stroke-width="2"/>
    <!-- Bars -->
    <rect x="-15" y="20" width="8" height="20" fill="#a78bfa"/>
    <rect x="-3" y="15" width="8" height="25" fill="#c4b5fd"/>
    <rect x="9" y="10" width="8" height="30" fill="#a78bfa"/>
  </g>

  <!-- AI Label (top right) -->
  <g transform="translate(340, 120)">
    <rect x="-30" y="-20" width="60" height="40" fill="#5b21b6" rx="4" stroke="#7c3aed" stroke-width="2"/>
    <text x="0" y="8" font-size="14" font-weight="bold" fill="#e0e7ff" text-anchor="middle">AI</text>
  </g>

  <!-- Decorative sparkle lines -->
  <g stroke="#a78bfa" stroke-width="1.5" opacity="0.5">
    <line x1="150" y1="80" x2="160" y2="95"/>
    <line x1="250" y1="90" x2="265" y2="100"/>
    <line x1="100" y1="200" x2="115" y2="210"/>
    <line x1="320" y1="250" x2="335" y2="265"/>
  </g>
</svg>