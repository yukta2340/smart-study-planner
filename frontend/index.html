<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Smart Study Planner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea, #764ba2);
        overflow-x: hidden;
        overflow-y: auto;
        perspective: 1200px;
        font-size: 16px;
        line-height: 1.5;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-30px);
        }
      }

      #root {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        display: block;
        padding: 0;
      }

      .loader {
        color: white;
        font-size: 24px;
        letter-spacing: 1px;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.5;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="loader">Loading Smart Planner...</div>
    </div>

    <script type="module" src="/src/index.js"></script>
  </body>
</html>
